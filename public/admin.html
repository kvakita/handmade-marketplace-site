<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="logo">Тёплая Мастерская</div>
      <nav class="nav">
        <a href="/index.html">Главная</a>
        <a href="/catalog.html">Каталог</a>
        <a href="/admin.html">Админка</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1>Локальная админка</h1>
      

      <div class="admin-grid">
        <div class="card">
          <h2>Добавить товар</h2>
          <form class="form" id="product-form">
            <input name="title" placeholder="Название" required />
            <input name="category" placeholder="Категория" required />
            <input name="subcategory" placeholder="Подкатегория" required />
            <input name="materials" placeholder="Материалы через запятую" required />
            <textarea name="description" placeholder="Описание" required></textarea>
            <input name="price" type="number" placeholder="Цена" required />
            <input name="productionTime" placeholder="Срок изготовления" required />
            <select name="status" required>
              <option value="В наличии">В наличии</option>
              <option value="На заказ">На заказ</option>
              <option value="Портфолио">Портфолио</option>
            </select>
            <input name="stock" type="number" placeholder="Количество" required />
            <input name="options" placeholder="Варианты через запятую" />
            <input name="masterId" type="number" placeholder="ID мастера" required />
            <input name="images" placeholder="Ссылки на фото через запятую" required />
            <button class="button" type="submit">Добавить товар</button>
          </form>
        </div>

        <div class="card">
          <h2>Добавить категорию</h2>
          <form class="form" id="category-form">
            <input name="name" placeholder="Название категории" required />
            <input name="subcategories" placeholder="Подкатегории через запятую" />
            <button class="button" type="submit">Добавить категорию</button>
          </form>

          <hr />

          <h2>Добавить новость</h2>
          <form class="form" id="news-form">
            <input name="title" placeholder="Заголовок" required />
            <textarea name="text" placeholder="Текст новости" required></textarea>
            <input name="date" placeholder="Дата, например 2026-03-22" required />
            <button class="button" type="submit">Добавить новость</button>
          </form>

          <hr />

          <h2>Добавить отзыв</h2>
          <form class="form" id="review-form">
            <input name="author" placeholder="Автор" required />
            <textarea name="text" placeholder="Текст отзыва" required></textarea>
            <input name="date" placeholder="Дата, например 2026-03-22" required />
            <button class="button" type="submit">Добавить отзыв</button>
          </form>
        </div>
      </div>

      <div class="admin-grid section">
        <div class="card">
          <h2>Товары</h2>
          <div id="admin-products" class="list"></div>
        </div>

        <div class="card">
          <h2>Категории</h2>
          <div id="admin-categories" class="list"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/admin.js"></script>
</body>
</html>
